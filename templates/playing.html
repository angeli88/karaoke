<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>卡拉OK</title>
    <link rel="stylesheet" href="/static/css/ktv.css">
    <link rel="stylesheet" href="/static/css/toast.style.css">
    <script type="text/javascript" src="/static/js/jq.min.js"></script>
    <script type="text/javascript" src="/static/js/qrcode.min.js"></script>
    <script type="text/javascript" src="/static/js/toast.script.js"></script>
</head>
<body>
<div class="top-tips"><div style="text-align: center;" id="playing-text"></div></div>

<!-- 固定二维码区域 -->
<div class="qr-code-fixed" id="qr-code-fixed">
    <div class="qr-code-container">
        <div class="qr-code-title">扫码点歌</div>
        <div id="qr-code-display"></div>
    </div>
</div>

<div class="video-container">
    <video id="myVideo" controls preload="auto">
        <source src="" type="video/mp4">
        你的浏览器不支持视频标签。
    </video>
    <audio style="display: none;" id="vocals" controls preload="auto">
        <source src="" type="audio/mpeg">
        你的浏览器不支持音频标签。
    </audio>
    <audio style="display: none;" id="accompaniment" controls preload="auto">
        <source src="" type="audio/mpeg">
        你的浏览器不支持音频标签。
    </audio>
    <audio style="display: none;" id="interruption" controls preload="auto">
        <source src="" type="audio/mpeg">
        你的浏览器不支持音频标签。
    </audio>
</div>

<div class="setting">
    <div class="setting-img"><img id="expand-img" src="/static/img/expand.svg" alt="expand.svg"></div>
    <div class="setting-list">
        <div id="switchVocal"><img src="/static/img/vocals.svg" alt="vocals.svg"><span>原唱</span></div>
        <div onclick="reSing();"><img src="/static/img/re-sing.svg" alt="re-sing.svg"><span>重唱</span></div>
        <div id="next-song"><img src="/static/img/next_song.svg" alt="next_song.svg"><span>切歌</span></div>
        <div id="change-volume"><img src="/static/img/volume.svg" alt="volume.svg"><span>调音</span></div>
    </div>
</div>
<div class="volume-setting">
    <div><div>原唱音量：</div><div class="volume-box">
        <div id="volume-vocals-progress" class="mkpgb-area">
            <div class="mkpgb-bar"></div>
            <div class="mkpgb-cur" style="width: 60%;"></div>
            <div class="mkpgb-dot" style="left: 60%;"></div>
        </div>
    </div></div>
    <div><div>伴奏音量：</div><div class="volume-box">
        <div id="volume-acc-progress" class="mkpgb-area">
            <div class="mkpgb-bar"></div>
            <div class="mkpgb-cur" style="width: 60%;"></div>
            <div class="mkpgb-dot" style="left: 60%;"></div>
        </div></div>
    </div>
</div>

<!-- Remote Control Panel -->
<div id="remote-control-panel" class="remote-control-panel">
    <div class="control-grid">
        <div class="control-item" data-action="play-pause" tabindex="0">
            <div class="control-icon">⏯</div>
            <div class="control-text" id="play-pause-text">暂停</div>
        </div>
        <div class="control-item" data-action="re-sing" tabindex="0">
            <div class="control-icon">🔄</div>
            <div class="control-text">重唱</div>
        </div>
        <div class="control-item" data-action="next-song" tabindex="0">
            <div class="control-icon">⏭</div>
            <div class="control-text">切歌</div>
        </div>
        <div class="control-item" data-action="vocal-switch" tabindex="0">
            <div class="control-icon">🎤</div>
            <div class="control-text">原唱/伴奏</div>
        </div>
        <div class="control-item" data-action="volume-vocal" tabindex="0">
            <div class="control-icon">🗣</div>
            <div class="control-text">人声 +</div>
            <div class="volume-indicator" id="vocal-volume-indicator">100%</div>
        </div>
        <div class="control-item" data-action="volume-acc" tabindex="0">
            <div class="control-icon">🎵</div>
            <div class="control-text">伴奏 +</div>
            <div class="volume-indicator" id="acc-volume-indicator">100%</div>
        </div>
        <div class="control-item" data-action="effect-applause" tabindex="0">
            <div class="control-icon">👏</div>
            <div class="control-text">掌声</div>
        </div>
        <div class="control-item" data-action="effect-cheer" tabindex="0">
            <div class="control-icon">🎉</div>
            <div class="control-text">欢呼</div>
        </div>
        <div class="control-item" data-action="effect-laugh" tabindex="0">
            <div class="control-icon">😄</div>
            <div class="control-text">大笑</div>
        </div>
        <div class="control-item" data-action="effect-sigh" tabindex="0">
            <div class="control-icon">😮</div>
            <div class="control-text">唏嘘</div>
        </div>
    </div>
    <div class="control-hints">
        <div class="hint-text">方向键：移动选择</div>
        <div class="hint-text">回车：确认</div>
        <div class="hint-text">返回键/ESC：关闭面板</div>
    </div>
</div>
</body>
<script>
    localStorage.setItem("server", "{{ prefix }}");
</script>
<script type="text/javascript" src="/static/js/ktv.js"></script>
</html>
