<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>卡拉OK</title>
    <link rel="stylesheet" href="/static/css/index.css">
    <link rel="stylesheet" href="/static/css/toast.style.css">
    <script type="text/javascript" src="/static/js/jq.min.js"></script>
    <script type="text/javascript" src="/static/js/qrcode.min.js"></script>
    <script type="text/javascript" src="/static/js/toast.script.js"></script>
    <script type="text/javascript" src="/static/js/fenye.js"></script>
</head>
<body>
<div class="container">
    <div class="head">
        <div class="head-row">
            <input id="file-input" type="file" multiple accept=".mp3, .mp4" style="display: none;">
            <input id="file-search" type="text" class="file-search-input" placeholder="请输入歌曲或歌手名字 ~" autocomplete="off">
            <a href="{{ prefix }}/dealVideo" id="pre-mp4" target="_blank">视频预处理</a>
            <a href="#" id="file-upload">上传文件</a>
            <a href="#" id="generate_code">手机点歌</a>
            <div class="qrcode"><div id="qrcode"></div></div>
            <a href="{{ prefix }}/sing" target="_blank">开始K歌</a>
        </div>
        <div class="head-row secondary">
            <a href="#" onclick="get_song_list()">曲库列表</a>
            <a href="#" onclick="get_history_list('history')">K歌历史</a>
            <a href="#" onclick="get_history_list('usually')">常点的歌</a>
            <a href="{{ prefix }}/song" target="_blank">控制台(已点<span id="addSongs">0</span>)</a>
            <a href="#" id="batch-delete" style="display: none;">批量删除</a>
        </div>
    </div>
    <div class="content-area">
        <table style="display: none;">
            <thead>
                <tr>
                    <th><input type="checkbox" id="select-all"></th>
                    <th>名称</th>
                    <th>标签</th>
                    <!-- <th id="create-time">创建时间</th> -->
                    <th>操作</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>
    <div class="fenye"><ul id="paging" class="pagination"></ul></div>
</div>
<div class="modal_cover"><div class="modal_gif"></div></div>
</body>
<script>
    localStorage.setItem("server", "{{ prefix }}");
</script>
<script type="text/javascript" src="/static/js/index.js"></script>
</html>
